{% extends "base.html" %}

{% block title %}Login - College Event Radar{% endblock %}

{% block content %}
    <div style="max-width: 400px; margin: 50px auto;">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">🔐 Login</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="/login" style="all: unset;">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn" style="flex: 1; margin: 0;">Login</button>
                        <a href="/" class="btn btn-secondary" style="flex: 1; margin: 0; text-align: center;">Cancel</a>
                    </div>
                </form>

                <p style="text-align: center; margin-top: 20px; color: #999;">
                    Don't have an account? <a href="/register">Register here</a>
                </p>
            </div>
        </div>
    </div>
{% endblock %}
