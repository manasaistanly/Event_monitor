{% extends "base.html" %}

{% block title %}Login - College Event Radar{% endblock %}

{% block content %}
    <div class="form-card">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
            <h2 style="justify-content: center; border: none; margin-bottom: 0.5rem;">Welcome Back</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Please enter your credentials to continue.</p>
        </div>

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="name@college.edu" required>
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                <a href="/" class="btn btn-secondary" style="width: 100%;">Return to Events</a>
            </div>
        </form>

        <p style="text-align: center; margin-top: 2.5rem; color: var(--text-secondary); font-size: 0.9rem;">
            New here? <a href="/register" style="color: var(--primary); font-weight: 700; text-decoration: none;">Create an account</a>
        </p>
    </div>
{% endblock %}
