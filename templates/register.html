{% extends "base.html" %}

{% block title %}Register - College Event Radar{% endblock %}

{% block content %}
    <div style="max-width: 500px; margin: 50px auto;">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">📝 Register</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="/register" style="all: unset;">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="role">Role</label>
                        <select id="role" name="role" required>
                            <option value="student">Student</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password (min 6 chars)" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required minlength="6">
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn" style="flex: 1; margin: 0;">Register</button>
                        <a href="/" class="btn btn-secondary" style="flex: 1; margin: 0; text-align: center;">Cancel</a>
                    </div>
                </form>

                <p style="text-align: center; margin-top: 20px; color: #999;">
                    Already have an account? <a href="/login">Login here</a>
                </p>
            </div>
        </div>
    </div>
{% endblock %}
